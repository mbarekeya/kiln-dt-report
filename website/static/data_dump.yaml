Services :
	mc_estimation_service
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/TimeScaleThing/Service/NamedIndividual/ConceptInstance
		sameAs : mc_estimation_service
		atStage : operation
		enabledBy : simulator_enabler
		provides : mc_estimation_result
	monitoring_service
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/TimeScaleThing/Service/NamedIndividual/ConceptInstance
		sameAs : monitoring_service
		atStage : operation
		enabledBy : simulator_enabler/chartjs/fastapi_enabler/godot_enabler
		provides : post_drying_report/monitoring_dashboard
		HasVisualization : true
	batch_loading_service
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/TimeScaleThing/Service/NamedIndividual/ConceptInstance
		sameAs : batch_loading_service
		atStage : operation
		enabledBy : scikit_learn_enabler/fastapi_enabler/pulp_enabler
		provides : batch_scenario
	intelligent_control_service
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/TimeScaleThing/Service/NamedIndividual/ConceptInstance
		sameAs : intelligent_control_service
		atStage : operation
		enabledBy : simulator_enabler/fastapi_enabler
		provides : control_action/deviation_warning
	visualization_3d_service
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/TimeScaleThing/Service/NamedIndividual/ConceptInstance
		sameAs : visualization_3d_service
		atStage : operation
		enabledBy : godot_enabler
		provides : real_time_viz
		HasVisualization : true
Enablers :
	scikit_learn_enabler
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : scikit_learn_enabler
		desc : scikit-learn hierarchical Ward clustering for batch loading scenario D
		enables : batch_loading_service
		hasInput : ward_clustering_model/inventory_data
	simulator_enabler
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : simulator_enabler
		desc : Python Simulator.py implementing the 7-phase drying cycle engine, MC decay model, and intelligent control loop
		enables : mc_estimation_service/monitoring_service/intelligent_control_service
		hasInput : sensor_data_streaming/recipe_model/drying_physics_model
	chartjs
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : chartjs
		desc : Chart.js frontend rendering real-time temperature and MC curves, phase progress bars, and KPI cards at port 8080
		enables : monitoring_service
	fastapi_enabler
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : fastapi_enabler
		desc : Python FastAPI backend exposing REST endpoints for dashboard interaction, cycle control, and scenario management
		enables : monitoring_service/batch_loading_service/intelligent_control_service
		hasInput : sensor_data_streaming/recipe_model/history_data/inventory_data
	godot_enabler
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : godot_enabler
		desc :  — 3D kiln visualization and operator UI for cycle initiation and batch validation
		enables : monitoring_service/visualization_3d_service
		hasInput : sensor_data_streaming/kiln_3d_model
	pulp_enabler
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : pulp_enabler
		desc : PuLP/HiGHS ILP solver for batch loading scenarios A, B, and C
		enables : batch_loading_service
		hasInput : inventory_data
	docker
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : docker
		desc : Docker Compose orchestrating Python backend and RabbitMQ containers for reproducible deployment
	rabbit_mq
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Enabler/NamedIndividual/ConceptInstance
		sameAs : rabbit_mq
		desc : RabbitMQ AMQP broker handling sensor streaming (wood.kiln.sensor), cycle start (wood.kiln.start), and intelligent control commands (wood.kiln.control)
		IsCommEnabler : true
Models :
	ward_clustering_model
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/Model/ImplementationThing/DTComponent/Input/NamedIndividual/ConceptInstance
		sameAs : ward_clustering_model
		inputTo : scikit_learn_enabler
		desc : Hierarchical Ward clustering (scikit-learn) used for scenario D batch loading optimization
	recipe_model
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/Model/ImplementationThing/DTComponent/Input/NamedIndividual/ConceptInstance
		sameAs : recipe_model
		inputTo : simulator_enabler/fastapi_enabler
		desc : R40 (EPN/PG, target 16%) and R44 (SAP, target 14%) drying recipes with 7 phases: Heating, Equalization, Auto Steaming 1-3, Fixed Steaming, and Cooling
	kiln_3d_model
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/Model/ImplementationThing/DTComponent/Input/NamedIndividual/ConceptInstance
		sameAs : kiln_3d_model
		inputTo : godot_enabler
		desc : Godot 4.3 3D scene KilnScene with Package.tscn for lumber lots, rail nodes, fan, coils, door, and GPU particles for steam
	drying_physics_model
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/Model/ImplementationThing/DTComponent/Input/NamedIndividual/ConceptInstance
		sameAs : drying_physics_model
		inputTo : simulator_enabler
		desc : Exponential MC decay model: dMC/dt = -k*(MC-THE), with K_DRYING constants per species (EPN=0.08, PG=0.07, SAP=0.05)
ProvidedThings :
	mc_estimation_result
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/ProvidedThing/Insight/NamedIndividual/ConceptInstance
		sameAs : mc_estimation_result
		desc : Real MC (exponential decay) and planned MC (linear reference) updated every 2 real seconds and displayed in dashboard charts and Godot UI
		hasTimeScale : rt
		providedBy : mc_estimation_service
	stop_command
		type : DescribedThing/Thing/ContainedElement/Action/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/AutomaticEnabledThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : stop_command
		desc : Operator-triggered stop via dashboard POST /api/stop; publishes stopped status to wood.kiln.sensor; resets Godot UI to door-open state
		IsAutomatic : false
		hasTimeScale : rt
	post_drying_report
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/ProvidedThing/Insight/NamedIndividual/ConceptInstance
		sameAs : post_drying_report
		desc : HTML report generated at cycle completion summarizing start/end time, final MC, DTAB statistics, phase durations, and recommendations for the next cycle
		hasTimeScale : slower_trt
		providedBy : monitoring_service
	monitoring_dashboard
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/ProvidedThing/Insight/NamedIndividual/ConceptInstance
		sameAs : monitoring_dashboard
		desc : Web dashboard at port 8080 showing MC curves, temperature curves, phase progress, DTAB values, and deviation status
		hasTimeScale : rt
		providedBy : monitoring_service
	batch_scenario
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/ProvidedThing/Insight/NamedIndividual/ConceptInstance
		sameAs : batch_scenario
		desc : 4 batch loading scenarios (A: max filling, B: highest quality, C: optimal throughput, D: Ward clustering) with KPIs for operator selection
		hasTimeScale : slower_trt
		providedBy : batch_loading_service
	start_command
		type : DescribedThing/Thing/ContainedElement/Action/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/AutomaticEnabledThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : start_command
		desc : Operator-triggered kiln start via Godot UI or dashboard after scenario validation; sends drying_group, width, initial_mc, total_pmp to wood.kiln.start
		IsAutomatic : false
		hasTimeScale : rt
	control_action
		type : DescribedThing/Thing/ContainedElement/Action/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/AutomaticEnabledThing/ProvidedThing/NamedIndividual/ConceptInstance
		sameAs : control_action
		desc : Automatic DT control actions published to wood.kiln.control: Ts setpoint adjustment (+-2C) for SLOW_DRYING/FAST_DRYING, damper aperture adjustment for DTAB HIGH/LOW deviations
		IsAutomatic : true
		hasTimeScale : rt
		providedBy : intelligent_control_service
	deviation_warning
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/ProvidedThing/Insight/NamedIndividual/ConceptInstance
		sameAs : deviation_warning
		desc : Deviation status: ON_TARGET, SLOW_DRYING, FAST_DRYING, CHECK_OVERDRYING; DTAB alerts HIGH/LOW/NORMAL displayed on dashboard
		hasTimeScale : rt
		providedBy : intelligent_control_service
	real_time_viz
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/ProvidedThing/Insight/NamedIndividual/ConceptInstance
		sameAs : real_time_viz
		desc : 3D visualization of kiln state: lumber color by MC, steam particle intensity, fan rotation and direction, coil light energy by Ts, door open/close
		hasTimeScale : rt
		providedBy : visualization_3d_service
	phase_extension_recommendation
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/ProvidedThing/Insight/NamedIndividual/ConceptInstance
		sameAs : phase_extension_recommendation
		desc : Advisory recommendation to extend current drying phase when target MC has not been reached; operator confirms or rejects via dashboard
		hasTimeScale : slower_trt
Data transmitted :
	sensor_data_trans
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/DataTransmitted/AutomaticEnabledThing/NamedIndividual/ConceptInstance
		sameAs : sensor_data_trans
		desc : Published every 2 real seconds to RabbitMQ queue wood.kiln.sensor as JSON payload containing Ts, Th, derived RH, estimated MC, current phase, elapsed hours, fan speed, fan direction, and cycle status
		IsAutomatic : true
		asData : sensor_data_streaming
		hasTimeScale : rt
		producedFrom : th_sensor/ts_sensor
	phase_data_trans
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/DataTransmitted/AutomaticEnabledThing/NamedIndividual/ConceptInstance
		sameAs : phase_data_trans
		desc : Current drying phase index and name, air velocity, fan direction, duration remaining, and progress percentage
		IsAutomatic : true
		hasTimeScale : rt
Sensors :
	th_sensor
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/SensingComponent/NamedIndividual/ConceptInstance
		sameAs : th_sensor
		desc : Wet-bulb temperature sensor (Th), used with Ts to compute relative humidity via psychrometric equations
		producedData : sensor_data_trans
	ts_sensor
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ConnectionComponent/TimeScaleThing/SensingComponent/NamedIndividual/ConceptInstance
		sameAs : ts_sensor
		desc : Dry-bulb temperature sensor (Ts), measures the air temperature inside the kiln chamber in degrees Celsius
		producedData : sensor_data_trans
System :
	fan
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ActingComponent/ConnectionComponent/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : fan
		desc : Circulates hot air throughout the kiln chamber; speed varies by drying phase and direction reverses every 2 simulated hours
		isContainedIn : kiln
	rail_2
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/NamedIndividual/ConceptInstance
		sameAs : rail_2
		desc : Second lumber rail, holds up to 16 lots of the same species and width
		isContainedIn : kiln
	door
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ActingComponent/ConnectionComponent/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : door
		desc : Sliding door that closes at cycle start and opens manually by operator at cycle end
		isContainedIn : kiln
	heater_coils
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ActingComponent/ConnectionComponent/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : heater_coils
		desc : Steam-fed heating coils that raise dry-bulb temperature progressively from ambient to target Ts across drying phases
		isContainedIn : kiln
	rail_1
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/NamedIndividual/ConceptInstance
		sameAs : rail_1
		desc : First lumber rail, holds up to 16 lots of the same species and width
		isContainedIn : kiln
	dampers
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/ActingComponent/ConnectionComponent/TimeScaleThing/NamedIndividual/ConceptInstance
		sameAs : dampers
		desc : Ventilation dampers that regulate the exchange of moist internal air with external air to control relative humidity inside the chamber
		isContainedIn : kiln
System environnement :
	lumber_inventory
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/NamedIndividual/ConceptInstance
		sameAs : lumber_inventory
		desc : Green lumber inventory stored outside the kiln awaiting drying; 70 lots generated by seed.py with species, width, length, and initial MC attributes; used by the DT for batch loading generation/optimization
		isContainedIn : drying_chamber
	lumber_load
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/NamedIndividual/ConceptInstance
		sameAs : lumber_load
		desc : Lumber lots stacked on two rails inside the kiln; species EPN, PG, or SAP
		isContainedIn : drying_chamber
	external_air
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/NamedIndividual/ConceptInstance
		sameAs : external_air
		desc : Ambient air outside the kiln; influences thermal losses through the kiln walls but is not explicitly controlled
		isContainedIn : drying_chamber
	surrounding_air
		type : DescribedThing/Thing/ContainedElement/Component/ImplementationThing/NamedIndividual/ConceptInstance
		sameAs : surrounding_air
		desc : Hot humid air circulated by the fan; properties determined by Ts, Th, and equilibrium moisture content
		isContainedIn : drying_chamber
Data :
	sensor_data_streaming
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Input/Data/NamedIndividual/ConceptInstance
		sameAs : sensor_data_streaming
		inputTo : simulator_enabler/fastapi_enabler/godot_enabler
		desc : Real-time sensor data published every 2s to wood.kiln.sensor: Ts, Th, derived RH, estimated MC, phase, elapsed hours, fan speed, fan direction, status
		fromData : sensor_data_trans
	history_data
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Input/Data/NamedIndividual/ConceptInstance
		sameAs : history_data
		inputTo : fastapi_enabler
		desc : In-memory history of up to 500 data points for dashboard chart reload and post-drying report generation
	inventory_data
		type : FidelityThing/DescribedThing/Thing/ContainedElement/Component/ImplementationThing/DTComponent/Input/Data/NamedIndividual/ConceptInstance
		sameAs : inventory_data
		inputTo : scikit_learn_enabler/fastapi_enabler/pulp_enabler
		desc : 70 lumber lots generated by seed.py with species, width, length, and initial MC attributes
